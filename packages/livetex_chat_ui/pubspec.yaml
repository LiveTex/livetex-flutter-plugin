name: livetex_chat_ui
description: Drop-in LiveTex chat UI (Material 3) built on livetex_chat.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  livetex_chat:
    git:
      url: https://github.com/LiveTex/livetex-flutter-plugin.git
      path: packages/livetex_chat
  cached_network_image: ^3.4.1
  file_picker: ^8.1.7
  intl: ^0.19.0
  url_launcher: ^6.3.1
  photo_view: ^0.15.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
